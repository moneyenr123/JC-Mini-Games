<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 - JC Mini Games</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #2196F3;
            --text: #ffffff;
            --grid-bg: #252525;
            --radius: 12px;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--card);
            margin: 15px; border-radius: var(--radius);
            width: 85%; max-width: 400px;
        }

        .stats-bar a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .score-box { text-align: center; }
        #score { font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        /* Grid Setup */
        .game-container {
            position: relative;
            width: 90vw; max-width: 380px;
            aspect-ratio: 1;
            background: #333;
            border-radius: 10px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
        }

        .grid-cell {
            background: var(--grid-bg);
            border-radius: 6px;
        }

        /* Tile Styling */
        .tile {
            position: absolute;
            width: calc((100% - 50px) / 4);
            height: calc((100% - 50px) / 4);
            border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; font-weight: bold;
            transition: all 0.15s ease-in-out;
            z-index: 10;
        }

        /* Tile Colors (Matches your blue accent theme) */
        .tile-2 { background: #3c3c3c; color: #eee; }
        .tile-4 { background: #4a4a4a; color: #eee; }
        .tile-8 { background: #1976D2; color: #fff; }
        .tile-16 { background: #1E88E5; color: #fff; }
        .tile-32 { background: #2196F3; color: #fff; }
        .tile-64 { background: #42A5F5; color: #fff; }
        .tile-128 { background: #64B5F6; color: #fff; font-size: 1.6rem; }
        .tile-256 { background: #90CAF9; color: #121212; font-size: 1.6rem; }
        .tile-512 { background: #BBDEFB; color: #121212; font-size: 1.6rem; }
        .tile-1024 { background: #E3F2FD; color: #121212; font-size: 1.2rem; }
        .tile-2048 { background: #ffffff; color: var(--accent); font-size: 1.2rem; box-shadow: 0 0 15px var(--accent); }

        .controls { margin-top: 30px; }
        button {
            background: var(--card); color: var(--accent); border: 1px solid var(--accent);
            padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="score-box">Score: <span id="score">0</span></div>
        <a href="../index.html">← EXIT</a>
    </div>

    <div class="game-container" id="grid-container">
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    </div>

    <div class="controls">
        <button onclick="setupGame()">New Game</button>
    </div>

    <script>
        let board = [];
        let score = 0;
        const size = 4;
        const container = document.getElementById('grid-container');
        const scoreDisplay = document.getElementById('score');

        function setupGame() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            score = 0;
            scoreDisplay.innerText = score;
            addTile();
            addTile();
            render();
        }

        function addTile() {
            let emptyCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length > 0) {
                let {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            // Remove old tiles
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(tile => tile.remove());

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${board[r][c]}`;
                        tile.innerText = board[r][c];
                        
                        // Calculate position based on grid gaps and cell size
                        const top = 10 + r * (container.offsetWidth - 20) / 4;
                        const left = 10 + c * (container.offsetWidth - 20) / 4;
                        
                        tile.style.top = `${top}px`;
                        tile.style.left = `${left}px`;
                        container.appendChild(tile);
                    }
                }
            }
        }

        function move(direction) {
            let hasChanged = false;
            let tempBoard = JSON.parse(JSON.stringify(board));

            if (direction === 'LEFT' || direction === 'RIGHT') {
                for (let r = 0; r < size; r++) {
                    let row = board[r].filter(v => v !== 0);
                    if (direction === 'RIGHT') row.reverse();
                    
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i+1]) {
                            row[i] *= 2;
                            score += row[i];
                            row.splice(i+1, 1);
                        }
                    }
                    
                    while (row.length < size) row.push(0);
                    if (direction === 'RIGHT') row.reverse();
                    board[r] = row;
                }
            } else { // UP or DOWN
                for (let c = 0; c < size; c++) {
                    let col = [];
                    for (let r = 0; r < size; r++) if (board[r][c] !== 0) col.push(board[r][c]);
                    if (direction === 'DOWN') col.reverse();

                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i+1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i+1, 1);
                        }
                    }

                    while (col.length < size) col.push(0);
                    if (direction === 'DOWN') col.reverse();
                    for (let r = 0; r < size; r++) board[r][c] = col[r];
                }
            }

            if (JSON.stringify(tempBoard) !== JSON.stringify(board)) {
                addTile();
                scoreDisplay.innerText = score;
                render();
                checkGameOver();
            }
        }

        function checkGameOver() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) return;
                    if (c < size - 1 && board[r][c] === board[r][c+1]) return;
                    if (r < size - 1 && board[r][c] === board[r+1][c]) return;
                }
            }
            alert("Game Over! Score: " + score);
            setupGame();
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') move('LEFT');
            if (e.key === 'ArrowRight') move('RIGHT');
            if (e.key === 'ArrowUp') move('UP');
            if (e.key === 'ArrowDown') move('DOWN');
        });

        // Touch Support
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });

        document.addEventListener('touchend', e => {
            let x = e.changedTouches[0].screenX;
            let y = e.changedTouches[0].screenY;
            let dx = x - touchStartX, dy = y - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) move('RIGHT'); else if (dx < -30) move('LEFT');
            } else {
                if (dy > 30) move('DOWN'); else if (dy < -30) move('UP');
            }
        });
</script>
</body>
</html>
