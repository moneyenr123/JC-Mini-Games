<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake - JC Mini Games</title>
    <style>
        :root {
            --bg-dark: #0f111a;
            --apple-red: #ff3b30;
            --snake-green: #34c759;
            --snake-dark: #28a745;
            --grid-line: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark);
            color: white; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        .header { margin-top: 20px; text-align: center; }
        #score-val { font-size: 3rem; font-weight: 800; margin: 5px 0; color: white; }

        /* Game Board with Grid */
        #game-container {
            position: relative;
            width: 90vw; max-width: 380px; aspect-ratio: 1;
            background-color: #141724;
            /* Realistic Grid Background */
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 5% 5%; /* Matches 20x20 grid */
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: grid; grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            padding: 5px; box-sizing: border-box;
        }

        .cell { position: relative; width: 100%; height: 100%; }

        /* Realistic Snake Head */
        .snake-head {
            background: linear-gradient(135deg, var(--snake-green), var(--snake-dark));
            border-radius: 8px;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        /* Eyes for the head */
        .snake-head::after, .snake-head::before {
            content: ""; position: absolute; width: 4px; height: 4px;
            background: white; border-radius: 50%; top: 20%;
        }
        .snake-head::after { right: 20%; }
        .snake-head::before { left: 20%; }

        /* Realistic Snake Body */
        .snake-body {
            background: linear-gradient(135deg, var(--snake-dark), #1e7e34);
            border-radius: 6px;
            transform: scale(0.9); /* Makes joints look smoother */
        }

        /* Realistic Apple */
        .food {
            background: radial-gradient(circle at 30% 30%, #ff5e57, var(--apple-red));
            border-radius: 50%;
            transform: scale(0.85);
            box-shadow: 0 4px 10px rgba(255, 59, 48, 0.4);
        }
        /* Small leaf on apple */
        .food::before {
            content: ""; position: absolute; top: -2px; left: 50%;
            width: 4px; height: 6px; background: #34c759;
            border-radius: 2px 5px 2px 5px; transform: rotate(15deg);
        }

        .controls { margin-top: 25px; display: grid; grid-template-areas: ". up ." "left down right"; gap: 12px; }
        .btn {
            width: 65px; height: 65px; background: #1c1f2e;
            border-radius: 20px; display: flex; align-items: center;
            justify-content: center; font-size: 24px; box-shadow: 0 4px 0 #000;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }

        .exit-btn { position: absolute; top: 20px; left: 20px; color: #444; text-decoration: none; font-size: 24px; }
    </style>
</head>
<body>

    <a href="../index.html" class="exit-btn">✕</a>
    <div class="header">
        <div id="score-val">1</div>
    </div>

    <div id="game-container"></div>

    <div class="controls">
        <div class="btn" style="grid-area: up" onclick="setDir('UP')">▲</div>
        <div class="btn" style="grid-area: left" onclick="setDir('LEFT')">◀</div>
        <div class="btn" style="grid-area: down" onclick="setDir('DOWN')">▼</div>
        <div class="btn" style="grid-area: right" onclick="setDir('RIGHT')">▶</div>
    </div>

<script>
    const GRID_SIZE = 20;
    const container = document.getElementById('game-container');
    
    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dir = 'RIGHT';
    let nextDir = 'RIGHT';
    let score = 1;
    const gameSpeed = 160; // Slower for realism

    function init() {
        container.innerHTML = '';
        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            const div = document.createElement('div');
            div.className = 'cell';
            container.appendChild(div);
        }
        gameLoop();
    }

    function setDir(d) {
        if (d === 'UP' && dir !== 'DOWN') nextDir = 'UP';
        if (d === 'DOWN' && dir !== 'UP') nextDir = 'DOWN';
        if (d === 'LEFT' && dir !== 'RIGHT') nextDir = 'LEFT';
        if (d === 'RIGHT' && dir !== 'LEFT') nextDir = 'RIGHT';
    }

    function update() {
        dir = nextDir;
        const head = { ...snake[0] };
        if (dir === 'UP') head.y--;
        if (dir === 'DOWN') head.y++;
        if (dir === 'LEFT') head.x--;
        if (dir === 'RIGHT') head.x++;

        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE || 
            snake.some(seg => seg.x === head.x && seg.y === head.y)) {
            alert("Game Over! Score: " + score);
            snake = [{x: 10, y: 10}];
            score = 1; dir = 'RIGHT'; nextDir = 'RIGHT';
            return;
        }

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
            score++;
            spawnFood();
        } else {
            snake.pop();
        }
    }

    function spawnFood() {
        food = {
            x: Math.floor(Math.random() * GRID_SIZE),
            y: Math.floor(Math.random() * GRID_SIZE)
        };
        // Don't spawn food on snake
        if (snake.some(s => s.x === food.x && s.y === food.y)) spawnFood();
    }

    function draw() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(c => c.className = 'cell');

        // Draw Apple
        cells[food.y * GRID_SIZE + food.x].classList.add('food');

        // Draw Snake
        snake.forEach((seg, i) => {
            const idx = seg.y * GRID_SIZE + seg.x;
            if (i === 0) {
                cells[idx].classList.add('snake-head');
            } else {
                cells[idx].classList.add('snake-body');
            }
        });

        document.getElementById('score-val').innerText = score;
    }

    function gameLoop() {
        update();
        draw();
        setTimeout(gameLoop, gameSpeed);
    }

    init();
</script>
</body>
</html>
