<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake - JC Mini Games</title>
    <style>
        :root {
            --bg-dark: #0f111a;
            --apple-red: #ff3b30;
            --snake-green: #34c759;
            --grid-line: #1c2033;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark);
            color: white; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        .header { margin-top: 30px; text-align: center; }
        #score-val { font-size: 3rem; font-weight: 800; margin: 10px 0; }

        /* Game Board */
        #game-container {
            position: relative;
            width: 90vw; max-width: 380px; aspect-ratio: 1;
            background: #141724; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: grid; grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            padding: 8px; gap: 2px;
        }

        .cell { border-radius: 4px; }

        /* Apple Aesthetic Blocks */
        .snake-node {
            background-color: var(--snake-green);
            border-radius: 6px; /* Rounded Apple-style */
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);
            z-index: 2;
        }

        .food {
            background-color: var(--apple-red);
            border-radius: 50%; /* Make the food look like a round apple */
            box-shadow: 0 0 10px var(--apple-red), inset 0 2px 4px rgba(255,255,255,0.5);
            transform: scale(0.8);
            z-index: 1;
        }

        /* Controls for Mobile */
        .controls {
            margin-top: 30px; display: grid;
            grid-template-areas: ". up ." "left down right";
            gap: 15px;
        }

        .btn {
            width: 60px; height: 60px; background: #24283b;
            border-radius: 15px; display: flex; align-items: center;
            justify-content: center; font-size: 24px; color: white;
            user-select: none; active: scale(0.9);
        }

        .exit-btn { position: absolute; top: 20px; left: 20px; color: #555; text-decoration: none; font-size: 20px; }
    </style>
</head>
<body>

    <a href="../index.html" class="exit-btn">✕</a>
    <div class="header">
        <div id="score-val">1</div>
    </div>

    <div id="game-container"></div>

    <div class="controls">
        <div class="btn" style="grid-area: up" onclick="setDir('UP')">▲</div>
        <div class="btn" style="grid-area: left" onclick="setDir('LEFT')">◀</div>
        <div class="btn" style="grid-area: down" onclick="setDir('DOWN')">▼</div>
        <div class="btn" style="grid-area: right" onclick="setDir('RIGHT')">▶</div>
    </div>

<script>
    const GRID_SIZE = 20;
    const container = document.getElementById('game-container');
    
    // Game State
    let snake = [{x: 10, y: 10}]; // Starts as exactly ONE block
    let food = {x: 15, y: 15};
    let dir = 'RIGHT';
    let nextDir = 'RIGHT';
    let score = 1;
    let gameSpeed = 150; // Slower speed (higher number = slower)

    function init() {
        container.innerHTML = '';
        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            const div = document.createElement('div');
            div.className = 'cell';
            container.appendChild(div);
        }
        gameLoop();
    }

    function setDir(newDir) {
        if (newDir === 'UP' && dir !== 'DOWN') nextDir = 'UP';
        if (newDir === 'DOWN' && dir !== 'UP') nextDir = 'DOWN';
        if (newDir === 'LEFT' && dir !== 'RIGHT') nextDir = 'LEFT';
        if (newDir === 'RIGHT' && dir !== 'LEFT') nextDir = 'RIGHT';
    }

    // Keyboard support
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp') setDir('UP');
        if (e.key === 'ArrowDown') setDir('DOWN');
        if (e.key === 'ArrowLeft') setDir('LEFT');
        if (e.key === 'ArrowRight') setDir('RIGHT');
    });

    function update() {
        dir = nextDir;
        const head = { ...snake[0] };

        if (dir === 'UP') head.y--;
        if (dir === 'DOWN') head.y++;
        if (dir === 'LEFT') head.x--;
        if (dir === 'RIGHT') head.x++;

        // Game Over: Wall hit or self hit
        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE || 
            snake.some(seg => seg.x === head.x && seg.y === head.y)) {
            alert("Game Over! Score: " + score);
            snake = [{x: 10, y: 10}];
            score = 1;
            dir = 'RIGHT';
            nextDir = 'RIGHT';
            return;
        }

        snake.unshift(head);

        // Check if food eaten
        if (head.x === food.x && head.y === food.y) {
            score++;
            food = {
                x: Math.floor(Math.random() * GRID_SIZE),
                y: Math.floor(Math.random() * GRID_SIZE)
            };
        } else {
            snake.pop();
        }
    }

    function draw() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(c => c.className = 'cell'); // Reset board

        // Draw Food (The Apple)
        const foodIdx = food.y * GRID_SIZE + food.x;
        cells[foodIdx].classList.add('food');

        // Draw Snake
        snake.forEach(seg => {
            const idx = seg.y * GRID_SIZE + seg.x;
            if (cells[idx]) cells[idx].classList.add('snake-node');
        });

        document.getElementById('score-val').innerText = score;
    }

    function gameLoop() {
        update();
        draw();
        setTimeout(gameLoop, gameSpeed);
    }

    init();
</script>
</body>
</html>
