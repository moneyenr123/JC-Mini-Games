<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper - JC Mini Games</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #2196F3;
            --mine: #F44336;
            --text: #ffffff;
            --hidden: #333333;
            --revealed: #252525;
            --radius: 12px;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        /* Top Bar */
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--card);
            margin: 15px; border-radius: var(--radius);
            width: 85%; max-width: 400px;
        }

        .stats-bar a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        /* Board */
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            width: 90vw; max-width: 380px;
            aspect-ratio: 1;
            padding: 10px;
            background: var(--card);
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .cell {
            background: var(--hidden);
            border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.1rem;
            cursor: pointer; user-select: none;
            transition: background 0.1s;
        }

        .cell.revealed { background: var(--revealed); }
        .cell.mine { background: var(--mine); }
        .cell.flagged::after { content: '🚩'; font-size: 0.8rem; }

        /* Number Colors */
        .n1 { color: #2196F3; } .n2 { color: #4CAF50; }
        .n3 { color: #F44336; } .n4 { color: #9C27B0; }
        .n5 { color: #FF9800; }

        .controls { margin-top: 25px; text-align: center; }
        .hint { font-size: 0.8rem; color: #888; margin-top: 10px; }
        button {
            background: transparent; color: var(--accent); border: 1px solid var(--accent);
            padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-item">Mines: <span id="mine-count" class="stat-val">15</span></div>
        <a href="../index.html">← EXIT</a>
    </div>

    <div class="grid" id="grid"></div>

    <div class="controls">
        <button onclick="initGame()">Restart Game</button>
        <div class="hint">Tip: Long-press to place a flag 🚩</div>
    </div>

    <script>
        const GRID_SIZE = 10;
        const MINE_COUNT = 15;
        let board = [];
        let revealedCount = 0;
        let gameOver = false;
        let firstClick = true;

        const gridEl = document.getElementById('grid');

        function initGame() {
            gridEl.innerHTML = '';
            board = [];
            revealedCount = 0;
            gameOver = false;
            firstClick = true;
            document.getElementById('mine-count').innerText = MINE_COUNT;

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.idx = i;
                
                // Click events
                cell.addEventListener('click', () => handleReveal(i));
                
                // Long press for flagging
                let timer;
                cell.addEventListener('touchstart', (e) => {
                    timer = setTimeout(() => handleFlag(i), 500);
                });
                cell.addEventListener('touchend', () => clearTimeout(timer));
                cell.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    handleFlag(i);
                });

                gridEl.appendChild(cell);
                board.push({ mine: false, revealed: false, flagged: false, count: 0 });
            }
        }

        function placeMines(excludeIdx) {
            let minesPlaced = 0;
            while (minesPlaced < MINE_COUNT) {
                let idx = Math.floor(Math.random() * 100);
                // Don't place mine on first click or its neighbors
                if (idx !== excludeIdx && !board[idx].mine && !isNeighbor(excludeIdx, idx)) {
                    board[idx].mine = true;
                    minesPlaced++;
                }
            }

            // Calculate numbers
            for (let i = 0; i < 100; i++) {
                if (!board[i].mine) {
                    board[i].count = getNeighbors(i).filter(n => board[n].mine).length;
                }
            }
        }

        function isNeighbor(a, b) {
            let r1 = Math.floor(a/10), c1 = a%10;
            let r2 = Math.floor(b/10), c2 = b%10;
            return Math.abs(r1-r2) <= 1 && Math.abs(c1-c2) <= 1;
        }

        function getNeighbors(idx) {
            let neighbors = [];
            let r = Math.floor(idx / 10);
            let c = idx % 10;

            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    let nr = r + i, nc = c + j;
                    if (nr >= 0 && nr < 10 && nc >= 0 && nc < 10 && !(i === 0 && j === 0)) {
                        neighbors.push(nr * 10 + nc);
                    }
                }
            }
            return neighbors;
        }

        function handleReveal(idx) {
            if (gameOver || board[idx].flagged || board[idx].revealed) return;

            if (firstClick) {
                placeMines(idx);
                firstClick = false;
            }

            if (board[idx].mine) {
                endGame(false);
                return;
            }

            revealCell(idx);
            if (revealedCount === (100 - MINE_COUNT)) endGame(true);
        }

        function revealCell(idx) {
            if (board[idx].revealed || board[idx].flagged) return;

            board[idx].revealed = true;
            revealedCount++;
            const el = gridEl.children[idx];
            el.classList.add('revealed');

            if (board[idx].count > 0) {
                el.innerText = board[idx].count;
                el.classList.add(`n${board[idx].count}`);
            } else {
                getNeighbors(idx).forEach(n => revealCell(n));
            }
        }

        function handleFlag(idx) {
            if (gameOver || board[idx].revealed) return;
            board[idx].flagged = !board[idx].flagged;
            gridEl.children[idx].classList.toggle('flagged');
        }

        function endGame(won) {
            gameOver = true;
            board.forEach((cell, i) => {
                if (cell.mine) {
                    gridEl.children[i].classList.add('mine');
                    gridEl.children[i].innerText = '💣';
                }
            });
            alert(won ? "Victory! You cleared the field." : "BOOM! Game Over.");
        }

        initGame();
    </script>
</body>
</html>
