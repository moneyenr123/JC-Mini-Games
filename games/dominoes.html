<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominoes - JC Mini Games</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #2196F3; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .board { display: flex; gap: 5px; padding: 20px; background: #000; min-height: 80px; width: 90%; overflow-x: auto; border-radius: 10px; margin: 20px; }
        .hand { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .tile { background: white; color: black; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; border: 2px solid #ccc; }
    </style>
</head>
<body>
    <h3>Dominoes Match</h3>
    <div class="board" id="board"></div>
    <p>Your Hand (Click to play):</p>
    <div class="hand" id="hand"></div>
    <script>
        let board = [2, 4]; // Starting tile
        let hand = [[4, 5], [5, 1], [1, 3], [3, 6], [2, 1]];

        function render() {
            const b = document.getElementById("board");
            b.innerHTML = board.map(n => `<div class="tile">${n}</div>`).join("");
            const h = document.getElementById("hand");
            h.innerHTML = "";
            hand.forEach((t, i) => {
                const div = document.createElement("div");
                div.className = "tile"; div.innerText = `${t[0]} | ${t[1]}`;
                div.onclick = () => play(i);
                h.appendChild(div);
            });
        }

        function play(i) {
            const tile = hand[i];
            const left = board[0], right = board[board.length-1];
            if(tile[0] === right) { board.push(tile[1]); hand.splice(i, 1); }
            else if(tile[1] === right) { board.push(tile[0]); hand.splice(i, 1); }
            else if(tile[1] === left) { board.unshift(tile[0]); hand.splice(i, 1); }
            else if(tile[0] === left) { board.unshift(tile[1]); hand.splice(i, 1); }
            else { alert("Doesn't match either end!"); }
            render();
            if(hand.length === 0) alert("Domino! You win!");
        }
        render();
    </script>
</body>
</html>
