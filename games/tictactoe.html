<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - JC Mini Games</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #2196F3;
            --x-color: #F44336;
            --o-color: #4CAF50;
            --text: #ffffff;
            --radius: 20px;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
        }

        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--card);
            margin: 20px; border-radius: 15px;
            width: 85%; max-width: 400px;
        }

        .stats-bar a { color: var(--accent); text-decoration: none; font-weight: bold; }

        .status {
            font-size: 1.5rem; font-weight: bold; margin-bottom: 20px;
            height: 2rem; color: var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%; max-width: 350px;
            aspect-ratio: 1;
        }

        .cell {
            background: var(--card);
            border-radius: var(--radius);
            display: flex; justify-content: center; align-items: center;
            font-size: 4rem; font-weight: bold;
            cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .cell:active { transform: scale(0.95); }
        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }

        .controls { margin-top: 40px; }
        button {
            background: var(--card); color: white; border: 1px solid #333;
            padding: 15px 30px; border-radius: 30px; font-size: 1rem;
            cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        <span>Tic Tac Toe</span>
        <a href="../index.html">← EXIT</a>
    </div>

    <div class="status" id="status">Your Turn (X)</div>

    <div class="grid" id="grid">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <div class="controls">
        <button onclick="resetGame()">Restart Game</button>
    </div>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;
        const statusDisplay = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function makeMove(idx) {
            if (board[idx] !== "" || !gameActive) return;

            board[idx] = "X";
            updateUI();
            
            if (checkWin("X")) {
                statusDisplay.innerText = "You Win!";
                gameActive = false;
                return;
            }

            if (board.includes("")) {
                statusDisplay.innerText = "AI is thinking...";
                gameActive = false; // Pause player
                setTimeout(aiMove, 500);
            } else {
                statusDisplay.innerText = "It's a Draw!";
                gameActive = false;
            }
        }

        function aiMove() {
            // Find best move using a simple minimax-style logic
            let bestScore = -Infinity;
            let move;
            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = "O";
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            board[move] = "O";
            updateUI();

            if (checkWin("O")) {
                statusDisplay.innerText = "AI Wins!";
            } else if (!board.includes("")) {
                statusDisplay.innerText = "It's a Draw!";
            } else {
                statusDisplay.innerText = "Your Turn (X)";
                gameActive = true;
            }
        }

        function minimax(board, depth, isMaximizing) {
            if (checkWin("O")) return 10;
            if (checkWin("X")) return -10;
            if (!board.includes("")) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = "O";
                        let score = minimax(board, depth + 1, false);
                        board[i] = "";
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = "X";
                        let score = minimax(board, depth + 1, true);
                        board[i] = "";
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWin(player) {
            return winConditions.some(condition => {
                return condition.every(index => board[index] === player);
            });
        }

        function updateUI() {
            cells.forEach((cell, i) => {
                cell.innerText = board[i];
                cell.className = `cell ${board[i].toLowerCase()}`;
            });
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            statusDisplay.innerText = "Your Turn (X)";
            updateUI();
        }
    </script>
</body>
</html>
