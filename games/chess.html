<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess - JC Mini Games</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #2196F3;
            --text: #ffffff;
            --light-sq: #cccccc;
            --dark-sq: #555555;
            --highlight: rgba(33, 150, 243, 0.6);
            --radius: 12px;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            user-select: none;
        }

        /* Top Bar */
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--card);
            margin: 15px; border-radius: var(--radius);
            width: 90%; max-width: 400px; box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .stats-bar a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .status-text { font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 10px; color: #fff;}

        /* Chess Board */
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 90%; max-width: 400px;
            aspect-ratio: 1;
            border: 4px solid var(--card);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .cell {
            display: flex; justify-content: center; align-items: center;
            font-size: 2.2rem; cursor: pointer; transition: 0.2s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .light { background: var(--light-sq); color: #000; }
        .dark { background: var(--dark-sq); color: #fff; }
        .selected { background: var(--highlight) !important; }
        .valid-move { position: relative; }
        .valid-move::after {
            content: ''; position: absolute; width: 25%; height: 25%;
            background: rgba(0, 0, 0, 0.3); border-radius: 50%;
        }

        .controls { margin-top: 20px; }
        button {
            background: var(--card); color: white; border: 1px solid #333;
            padding: 12px 20px; border-radius: 8px; font-size: 1rem;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #333; border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="stats-bar">
        <span id="turn-indicator">White's Turn</span>
        <a href="../index.html">← EXIT</a>
    </div>

    <div class="status-text" id="status-msg">Capture the King to win!</div>

    <div class="board" id="board"></div>

    <div class="controls">
        <button onclick="setupBoard()">Restart Game</button>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const turnInd = document.getElementById('turn-indicator');
        const statusMsg = document.getElementById('status-msg');

        // Unicode Chess Pieces
        const PIECES = {
            w: { k: '♔', q: '♕', r: '♖', b: '♗', n: '♘', p: '♙' },
            b: { k: '♚', q: '♛', r: '♜', b: '♝', n: '♞', p: '♟' }
        };

        let board = [];
        let isWhiteTurn = true;
        let selectedIdx = null;
        let gameOver = false;

        const initialBoard = [
            'br','bn','bb','bq','bk','bb','bn','br',
            'bp','bp','bp','bp','bp','bp','bp','bp',
            '','','','','','','','',
            '','','','','','','','',
            '','','','','','','','',
            '','','','','','','','',
            'wp','wp','wp','wp','wp','wp','wp','wp',
            'wr','wn','wb','wq','wk','wb','wn','wr'
        ];

        function setupBoard() {
            board = [...initialBoard];
            isWhiteTurn = true;
            selectedIdx = null;
            gameOver = false;
            statusMsg.innerText = "Capture the King to win!";
            statusMsg.style.color = "#fff";
            renderBoard();
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            turnInd.innerText = isWhiteTurn ? "White's Turn" : "Black's Turn";
            turnInd.style.color = isWhiteTurn ? "#fff" : "#aaa";

            for (let i = 0; i < 64; i++) {
                let cell = document.createElement('div');
                let row = Math.floor(i / 8);
                let col = i % 8;
                
                cell.className = `cell ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                if (selectedIdx === i) cell.classList.add('selected');
                
                let piece = board[i];
                if (piece) {
                    cell.innerText = PIECES[piece[0]][piece[1]];
                }

                cell.onclick = () => handleSquareClick(i);
                boardEl.appendChild(cell);
            }
        }

        function handleSquareClick(idx) {
            if (gameOver) return;
            const piece = board[idx];
            const myColor = isWhiteTurn ? 'w' : 'b';

            // Select own piece
            if (piece && piece[0] === myColor) {
                selectedIdx = idx;
                renderBoard();
                return;
            }

            // Move selected piece
            if (selectedIdx !== null) {
                if (isValidMove(selectedIdx, idx)) {
                    // Check win condition (Captured King)
                    if (board[idx] && board[idx][1] === 'k') {
                        gameOver = true;
                        statusMsg.innerText = `${isWhiteTurn ? "WHITE" : "BLACK"} WINS!`;
                        statusMsg.style.color = "var(--accent)";
                    }

                    // Move piece
                    board[idx] = board[selectedIdx];
                    board[selectedIdx] = '';
                    
                    // Pawn Promotion (Auto-Queen)
                    if (board[idx][1] === 'p' && (Math.floor(idx / 8) === 0 || Math.floor(idx / 8) === 7)) {
                        board[idx] = myColor + 'q'; 
                    }

                    selectedIdx = null;
                    if(!gameOver) isWhiteTurn = !isWhiteTurn;
                    renderBoard();
                } else {
                    selectedIdx = null;
                    renderBoard();
                }
            }
        }

        function isValidMove(from, to) {
            const p = board[from];
            const type = p[1];
            const color = p[0];
            const r1 = Math.floor(from / 8), c1 = from % 8;
            const r2 = Math.floor(to / 8), c2 = to % 8;
            const dr = r2 - r1, dc = c2 - c1;
            const dir = color === 'w' ? -1 : 1;

            // Cannot capture own piece
            if (board[to] && board[to][0] === color) return false;

            // Movement rules
            switch(type) {
                case 'p': // Pawn
                    if (dc === 0 && board[to] === '') {
                        if (dr === dir) return true; // Forward 1
                        // Forward 2 on first move
                        if ((color === 'w' && r1 === 6 || color === 'b' && r1 === 1) && dr === dir * 2 && board[from + dir*8] === '') return true; 
                    }
                    // Capture
                    if (Math.abs(dc) === 1 && dr === dir && board[to] !== '') return true;
                    return false;
                case 'n': // Knight
                    return (Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2);
                case 'k': // King
                    return Math.abs(dr) <= 1 && Math.abs(dc) <= 1;
                case 'r': // Rook
                    return (dr === 0 || dc === 0) && clearPath(from, to, dr, dc);
                case 'b': // Bishop
                    return Math.abs(dr) === Math.abs(dc) && clearPath(from, to, dr, dc);
                case 'q': // Queen
                    return (dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) && clearPath(from, to, dr, dc);
            }
            return false;
        }

        // Check if path is clear for Rooks, Bishops, Queens
        function clearPath(from, to, dr, dc) {
            const rStep = dr === 0 ? 0 : dr > 0 ? 1 : -1;
            const cStep = dc === 0 ? 0 : dc > 0 ? 1 : -1;
            let curr = from + (rStep * 8) + cStep;
            
            while (curr !== to) {
                if (board[curr] !== '') return false;
                curr += (rStep * 8) + cStep;
            }
            return true;
        }

        setupBoard();
    </script>
</body>
</html>
