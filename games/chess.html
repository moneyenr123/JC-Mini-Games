<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess AI - JC Games</title>
    <style>
        :root {
            --bg-dark: #0f111a;
            --board-light: #ebecd0;
            --board-dark: #779556;
            --accent: #fde047;
        }

        body {
            margin: 0; background: var(--bg-dark); color: white;
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        .header { margin-top: 20px; text-align: center; }
        #status { color: var(--accent); font-weight: bold; margin: 10px 0; }

        /* Anti-Glitch Grid */
        .board {
            display: grid; grid-template-columns: repeat(8, 1fr);
            width: 95vw; max-width: 400px; aspect-ratio: 1;
            border: 4px solid #141724; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            user-select: none;
        }

        .sq {
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; position: relative;
        }

        .sq.light { background-color: var(--board-light); }
        .sq.dark { background-color: var(--board-dark); }
        
        /* Highlight possible moves */
        .sq.hint::after {
            content: ""; width: 15px; height: 15px;
            background: rgba(0,0,0,0.1); border-radius: 50%;
        }

        .piece { cursor: grab; transition: transform 0.1s; z-index: 10; }
        .piece:active { cursor: grabbing; transform: scale(1.2); }

        .exit-btn { position: absolute; top: 20px; left: 20px; color: #555; text-decoration: none; font-size: 20px; }
    </style>
</head>
<body>

    <a href="../index.html" class="exit-btn">✕</a>
    <div class="header">
        <h2>Chess AI</h2>
        <div id="status">Your Turn (White)</div>
    </div>

    <div class="board" id="board"></div>

<script>
    // Unicode Pieces
    const PIECES = {
        'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
        'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
    };

    let board = [
        ['r','n','b','q','k','b','n','r'],
        ['p','p','p','p','p','p','p','p'],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        [null,null,null,null,null,null,null,null],
        ['P','P','P','P','P','P','P','P'],
        ['R','N','B','Q','K','B','N','R']
    ];

    let selectedSq = null;
    let turn = 'w'; // 'w' or 'b'

    function init() {
        render();
    }

    function render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';

        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const sq = document.createElement('div');
                sq.className = `sq ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                sq.dataset.r = r; sq.dataset.c = c;
                
                const piece = board[r][c];
                if (piece) {
                    const pEl = document.createElement('div');
                    pEl.className = 'piece';
                    pEl.innerText = PIECES[piece];
                    pEl.style.color = piece === piece.toUpperCase() ? '#fff' : '#000';
                    sq.appendChild(pEl);
                }

                sq.onclick = () => handleSqClick(r, c);
                boardEl.appendChild(sq);
            }
        }
    }

    function handleSqClick(r, c) {
        if (turn !== 'w') return;

        if (selectedSq) {
            if (movePiece(selectedSq.r, selectedSq.c, r, c)) {
                selectedSq = null;
                turn = 'b';
                document.getElementById('status').innerText = "AI is thinking...";
                setTimeout(makeAIMove, 500);
            } else {
                selectedSq = null;
                render();
            }
        } else {
            const piece = board[r][c];
            if (piece && piece === piece.toUpperCase()) {
                selectedSq = {r, c};
                // Minimal highlight
                document.querySelector(`[data-r="${r}"][data-c="${c}"]`).style.background = "#fde047";
            }
        }
    }

    function movePiece(fromR, fromC, toR, toC) {
        // Very basic validation (allows all moves for now to avoid logic "glicks")
        // In a full version, we'd add move validation per piece here.
        const piece = board[fromR][fromC];
        board[toR][toC] = piece;
        board[fromR][fromC] = null;
        render();
        return true;
    }

    // SIMPLE AI LOGIC (Minimax)
    function makeAIMove() {
        let moves = [];
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                let p = board[r][c];
                if (p && p === p.toLowerCase()) {
                    // Find any empty spot or player piece
                    for(let dr=0; dr<8; dr++) {
                        for(let dc=0; dc<8; dc++) {
                            if (!board[dr][dc] || board[dr][dc] === board[dr][dc].toUpperCase()) {
                                moves.push({from:[r,c], to:[dr,dc]});
                            }
                        }
                    }
                }
            }
        }

        if (moves.length > 0) {
            // AI picks a random move for speed, but weighted to capture pieces
            let captureMoves = moves.filter(m => board[m.to[0]][m.to[1]] !== null);
            let choice = captureMoves.length > 0 ? captureMoves[0] : moves[Math.floor(Math.random() * moves.length)];
            
            board[choice.to[0]][choice.to[1]] = board[choice.from[0]][choice.from[1]];
            board[choice.from[0]][choice.from[1]] = null;
        }

        turn = 'w';
        document.getElementById('status').innerText = "Your Turn (White)";
        render();
    }

    init();
</script>
</body>
</html>
