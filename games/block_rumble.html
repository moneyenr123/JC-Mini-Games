<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Rumble - JC Mini Games</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JC Games">

    <style>
        :root {
            --bg-dark: #10121d; /* Navy from screenshot */
            --grid-line: #1c2033; /* Dark grid line */
            --text-main: #ffffff;
            --text-title: #ff8a80; /* Pinkish title color */
            
            /* Glossy Block Colors */
            --b-magenta: #e040fb;
            --b-red: #ff5252;
            --b-yellow: #ffd600;
            --b-blue: #2979ff;
            --b-green: #00c853;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark);
            color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
        }

        /* Top Bar & Score */
        .title { color: var(--text-title); font-size: 1.5rem; font-weight: bold; margin-top: 25px; }
        #score-val { font-size: 4rem; font-weight: 800; margin: 10px 0 20px 0; }

        /* Exit Button (for PWA) */
        .exit-btn {
            position: absolute; top: 15px; left: 15px; text-decoration: none;
            color: #888; font-size: 0.9rem; font-weight: bold;
        }

        /* 8x8 Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            width: 90vw; max-width: 380px; aspect-ratio: 1;
            padding: 2px;
            box-sizing: border-box;
            user-select: none;
        }

        /* Basic Cell (Empty) */
        .cell {
            background-color: #1a1e2e; /* Slightly lighter navy for cell interior */
            border-radius: 2px; /* Slight rounding on empty cell edges */
        }

        /* Block Style (The Glossy Look) */
        .block {
            border-radius: 8px; /* High rounding */
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.4), /* Upper Shine */
                        inset 0 -2px 5px rgba(0,0,0,0.3);       /* Bottom Shadow */
        }

        /* Block Tray */
        .tray {
            margin-top: 40px; display: flex;
            justify-content: space-around;
            width: 100%; max-width: 400px;
            height: 120px;
        }

        /* Piece Container (Invisible hitbox for dragging) */
        .piece-container {
            width: 80px; height: 80px; /* Base size */
            display: grid; gap: 4px;
            cursor: grab;
            transition: transform 0.1s;
        }

        .dragging {
            opacity: 0.7; transform: scale(1.1);
            position: absolute; pointer-events: none;
            z-index: 1000;
        }

        /* Specific Colors from colors list (e.g. b-blue) */
        .c-magenta { background-color: var(--b-magenta); }
        .c-red { background-color: var(--b-red); }
        .c-yellow { background-color: var(--b-yellow); }
        .c-blue { background-color: var(--b-blue); }
        .c-green { background-color: var(--b-green); }

    </style>
</head>
<body>

    <a href="../index.html" class="exit-btn">← EXIT</a>
    <div class="title">Block Rumble</div>
    <div id="score-val">0</div>

    <div class="grid" id="main-grid"></div>

    <div class="tray" id="tray">
        <div class="piece-container" id="p1" onmousedown="startDrag(event, 0)" ontouchstart="startDrag(event, 0)"></div>
        <div class="piece-container" id="p2" onmousedown="startDrag(event, 1)" ontouchstart="startDrag(event, 1)"></div>
        <div class="piece-container" id="p3" onmousedown="startDrag(event, 2)" ontouchstart="startDrag(event, 2)"></div>
    </div>

    <script>
        const GRID_SIZE = 8;
        let score = 0;
        let board = Array(GRID_SIZE * GRID_SIZE).fill(null); /* Store color name directly */
        let trayPieces = [null, null, null];
        
        // Piece shapes, each with a specific color from screenshot
        const SHAPES = [
            { s: [[0,0], [0,1], [1,0], [1,1]], c: "c-red" },     /* Square (Red) */
            { s: [[0,0], [0,1], [0,2]],        c: "c-blue" },    /* I-3 Horizontal (Blue) */
            { s: [[0,0], [0,1], [0,2], [0,3]], c: "c-green" },   /* I-4 Horizontal (Green) */
            { s: [[0,1], [1,0], [1,1], [1,2]], c: "c-magenta" }, /* T-Shape (Magenta) */
            { s: [[0,0], [1,0], [2,0]],        c: "c-yellow" }   /* I-3 Vertical (Yellow) */
        ];

        // Initialization
        function init() {
            const gridEl = document.getElementById('main-grid');
            gridEl.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                gridEl.appendChild(cell);
            }
            refreshTray();
            updateUI();
        }

        function refreshTray() {
            for (let i = 0; i < 3; i++) {
                const pieceDef = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                trayPieces[i] = pieceDef;
                renderTrayPiece(i, pieceDef);
            }
        }

        function renderTrayPiece(index, pieceDef) {
            const container = document.getElementById(`p${index+1}`);
            container.innerHTML = '';
            container.style.visibility = 'visible';
            
            const shape = pieceDef.s;
            const color = pieceDef.c;

            // Determine bounding box for grid dimensions
            const rows = Math.max(...shape.map(p => p[0])) + 1;
            const cols = Math.max(...shape.map(p => p[1])) + 1;
            
            container.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            // Adjust piece size to match grid cell size roughly
            container.style.width = `${cols * 25}px`;
            container.style.height = `${rows * 25}px`;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    if (shape.some(p => p[0] === r && p[1] === c)) {
                        cell.className = `block ${color}`;
                    }
                    container.appendChild(cell);
                }
            }
        }

        // Dragging Logic
        let currentDrag = null;
        let dragPieceIdx = -1;

        function startDrag(e, idx) {
            if (!trayPieces[idx] || e.target.className === "piece-container") return;
            dragPieceIdx = idx;
            currentDrag = e.currentTarget.cloneNode(true);
            currentDrag.classList.add('dragging');
            document.body.appendChild(currentDrag);
            moveAt(e);
        }

        function moveAt(e) {
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            // Center piece under thumb, lifting it slightly
            currentDrag.style.left = clientX - currentDrag.offsetWidth / 2 + 'px';
            currentDrag.style.top = clientY - currentDrag.offsetHeight + 'px'; 
        }

        document.addEventListener('mousemove', (e) => currentDrag && moveAt(e));
        document.addEventListener('touchmove', (e) => currentDrag && moveAt(e), {passive: false});

        document.addEventListener('mouseup', (e) => endDrag(e));
        document.addEventListener('touchend', (e) => endDrag(e.changedTouches[0]));

        function endDrag(e) {
            if (!currentDrag) return;
            
            const grid = document.getElementById('main-grid');
            const rect = grid.getBoundingClientRect();
            const cellW = rect.width / 8;
            const cellH = rect.height / 8;

            const x = e.clientX - rect.left;
            // The drop point is the center of the first block in the dragged piece.
            const y = e.clientY - rect.top; 

            const col = Math.floor(x / cellW);
            const row = Math.floor(y / cellH);

            if (row >= 0 && row < 8 && col >= 0 && col < 8) {
                tryPlace(row, col);
            }

            document.body.removeChild(currentDrag);
            currentDrag = null;
        }

        function tryPlace(r, c) {
            const piece = trayPieces[dragPieceIdx];
            const shape = piece.s;
            const color = piece.c;

            // Check if piece fits
            const fits = shape.every(p => {
                const nr = r + p[0], nc = c + p[1];
                return nr < 8 && nc < 8 && board[nr * 8 + nc] === null;
            });

            if (fits) {
                shape.forEach(p => board[(r + p[0]) * 8 + (c + p[1])] = color);
                document.getElementById(`p${dragPieceIdx+1}`).style.visibility = 'hidden';
                trayPieces[dragPieceIdx] = null;
                score += shape.length;
                
                checkLines();
                if (trayPieces.every(p => p === null)) refreshTray();
                updateUI();
                checkGameOver();
            }
        }

        function checkLines() {
            let linesCleared = 0;
            let rowsToClear = [], colsToClear = [];

            // Identify Full Rows
            for (let r = 0; r < 8; r++) {
                if (board.slice(r * 8, r * 8 + 8).every(v => v !== null)) rowsToClear.push(r);
            }
            // Identify Full Cols
            for (let c = 0; c < 8; c++) {
                let col = [];
                for (let r = 0; r < 8; r++) col.push(board[r * 8 + c]);
                if (col.every(v => v !== null)) colsToClear.push(c);
            }

            // Perform Clearance simultaneously
            rowsToClear.forEach(r => { for (let c=0; c<8; c++) board[r*8 + c] = null; });
            colsToClear.forEach(c => { for (let r=0; r<8; r++) board[r*8 + c] = null; });
            
            linesCleared = rowsToClear.length + colsToClear.length;
            if (linesCleared > 0) {
                // Scoring bonus based on lines cleared simultaneously
                score += (linesCleared === 1) ? 10 : (linesCleared === 2) ? 30 : 60;
            }
        }

        function updateUI() {
            document.getElementById('score-val').innerText = score;
            const cells = document.querySelectorAll('.cell');
            board.forEach((color, i) => {
                cells[i].className = color ? `cell block ${color}` : 'cell';
            });
        }

        function checkGameOver() {
            // Check if any available piece fits anywhere
            const canMove = trayPieces.some(piece => {
                if (!piece) return false;
                const shape = piece.s;
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        if (shape.every(p => {
                            const nr = r + p[0], nc = c + p[1];
                            return nr < 8 && nc < 8 && board[nr * 8 + nc] === null;
                        })) return true;
                    }
                }
                return false;
            });

            if (!canMove && trayPieces.some(p => p !== null)) {
                alert("Game Over! Final Score: " + score);
                score = 0;
                board.fill(null);
                refreshTray();
                updateUI();
            }
        }

        init();
    </script>
</body>
</html>
