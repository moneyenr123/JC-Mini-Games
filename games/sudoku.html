<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku - JC Mini Games</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #2196F3;
            --error: #F44336;
            --text: #ffffff;
            --dim-text: #888;
            --radius: 12px;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Top Bar */
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--card);
            margin: 15px; border-radius: var(--radius);
            width: 85%; max-width: 400px;
        }

        .stats-bar a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .mistakes { font-weight: bold; }

        /* Sudoku Grid */
        .sudoku-container {
            width: 90vw; max-width: 380px;
            aspect-ratio: 1;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            background: #444; /* Grid lines color */
            border: 3px solid #444;
            border-radius: 8px;
            overflow: hidden;
        }

        .cell {
            background: var(--card);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.4rem; cursor: pointer;
            border: 0.5px solid #333;
            user-select: none;
        }

        /* Thick borders for 3x3 blocks */
        .cell:nth-child(3n) { border-right: 2px solid #444; }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #444; }

        .cell.selected { background: #333; color: var(--accent); }
        .cell.fixed { font-weight: bold; color: white; }
        .cell.user { color: var(--accent); }
        .cell.wrong { color: var(--error); background: rgba(244, 67, 54, 0.1); }

        /* Number Pad */
        .num-pad {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 90vw; max-width: 380px;
        }

        .num-btn {
            background: var(--card);
            border-radius: 10px;
            padding: 15px 0;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.1s;
        }

        .num-btn:active { transform: scale(0.9); background: #252525; }

        .controls { margin-top: 20px; }
        button.new-game {
            background: transparent; color: var(--accent); border: 1px solid var(--accent);
            padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="mistakes">Mistakes: <span id="mistake-count">0</span>/3</div>
        <a href="../index.html">← EXIT</a>
    </div>

    <div class="sudoku-container" id="grid"></div>

    <div class="num-pad">
        <div class="num-btn" onclick="inputNumber(1)">1</div>
        <div class="num-btn" onclick="inputNumber(2)">2</div>
        <div class="num-btn" onclick="inputNumber(3)">3</div>
        <div class="num-btn" onclick="inputNumber(4)">4</div>
        <div class="num-btn" onclick="inputNumber(5)">5</div>
        <div class="num-btn" onclick="inputNumber(6)">6</div>
        <div class="num-btn" onclick="inputNumber(7)">7</div>
        <div class="num-btn" onclick="inputNumber(8)">8</div>
        <div class="num-btn" onclick="inputNumber(9)">9</div>
        <div class="num-btn" style="color: var(--error)" onclick="inputNumber(0)">⌫</div>
    </div>

    <div class="controls">
        <button class="new-game" onclick="generateGame()">New Game</button>
    </div>

    <script>
        let solution = [];
        let displayBoard = [];
        let selectedCell = null;
        let mistakes = 0;

        function generateGame() {
            mistakes = 0;
            document.getElementById('mistake-count').innerText = mistakes;
            
            // 1. Create a solved Sudoku board
            solution = solveSudoku(Array(81).fill(0));
            
            // 2. Remove numbers to create the puzzle (Medium difficulty)
            displayBoard = [...solution];
            let cellsToRemove = 45; 
            while (cellsToRemove > 0) {
                let idx = Math.floor(Math.random() * 81);
                if (displayBoard[idx] !== 0) {
                    displayBoard[idx] = 0;
                    cellsToRemove--;
                }
            }
            
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 81; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (displayBoard[i] !== 0) {
                    cell.innerText = displayBoard[i];
                    cell.classList.add('fixed');
                }
                cell.onclick = () => selectCell(i, cell);
                grid.appendChild(cell);
            }
        }

        function selectCell(idx, el) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
            if (displayBoard[idx] !== 0 && !el.classList.contains('user')) return;
            
            selectedCell = idx;
            el.classList.add('selected');
        }

        function inputNumber(num) {
            if (selectedCell === null) return;
            const cells = document.querySelectorAll('.cell');
            const target = cells[selectedCell];

            if (num === 0) { // Eraser
                displayBoard[selectedCell] = 0;
                target.innerText = '';
                target.classList.remove('wrong', 'user');
                return;
            }

            if (num === solution[selectedCell]) {
                displayBoard[selectedCell] = num;
                target.innerText = num;
                target.classList.remove('wrong');
                target.classList.add('user');
                checkWin();
            } else {
                mistakes++;
                document.getElementById('mistake-count').innerText = mistakes;
                target.innerText = num;
                target.classList.add('wrong');
                if (mistakes >= 3) {
                    alert("Game Over! Too many mistakes.");
                    generateGame();
                }
            }
        }

        function checkWin() {
            if (!displayBoard.includes(0)) {
                alert("Congratulations! You solved the Sudoku.");
                generateGame();
            }
        }

        // --- Sudoku Solver Logic (Backtracking) ---
        function solveSudoku(board) {
            let empty = board.indexOf(0);
            if (empty === -1) return board;

            let row = Math.floor(empty / 9);
            let col = empty % 9;
            let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);

            for (let n of nums) {
                if (isValid(board, row, col, n)) {
                    board[empty] = n;
                    if (solveSudoku(board)) return board;
                    board[empty] = 0;
                }
            }
            return false;
        }

        function isValid(board, r, c, n) {
            for (let i = 0; i < 9; i++) {
                if (board[r * 9 + i] === n || board[i * 9 + c] === n) return false;
            }
            let br = Math.floor(r / 3) * 3;
            let bc = Math.floor(c / 3) * 3;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[(br + i) * 9 + (bc + j)] === n) return false;
                }
            }
            return true;
        }

        generateGame();
    </script>
</body>
</html>
