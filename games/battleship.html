<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship - JC Mini Games</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --accent: #2196F3;
            --hit: #F44336;
            --miss: #aaaaaa;
            --ship: #4CAF50;
            --text: #ffffff;
            --radius: 12px;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Top Bar */
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--card);
            margin: 15px; border-radius: var(--radius);
            width: 90%; max-width: 400px; box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .stats-bar a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .status-text { font-size: 1.1rem; font-weight: bold; text-align: center; margin-bottom: 10px; color: var(--accent);}

        /* Game Boards */
        .board-container {
            display: flex; flex-direction: column; gap: 20px; width: 90%; max-width: 400px;
        }

        .board-label { text-align: center; font-size: 0.9rem; color: #888; margin-bottom: 5px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            background: #333;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--card);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }

        .ai-board .cell:hover { background: #2a2a2a; }

        /* Cell States */
        .cell.ship { background: var(--ship); }
        .cell.hit { background: var(--hit); color: white; }
        .cell.miss { background: var(--card); position: relative; }
        .cell.miss::after {
            content: ''; position: absolute; width: 30%; height: 30%;
            background: var(--miss); border-radius: 50%;
        }

        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button {
            background: var(--accent); color: white; border: none;
            padding: 12px 20px; border-radius: 8px; font-size: 1rem;
            cursor: pointer; font-weight: bold;
        }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <span id="score">Enemy Ships Left: 5</span>
        <a href="../index.html">← EXIT</a>
    </div>

    <div class="status-text" id="status-msg">Place ships or Randomize to start!</div>

    <div class="board-container">
        <div>
            <div class="board-label">ENEMY WATERS (Tap to Attack)</div>
            <div class="grid ai-board" id="ai-board"></div>
        </div>

        <div>
            <div class="board-label">YOUR FLEET</div>
            <div class="grid" id="player-board"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="setupGame()">Randomize & Restart</button>
    </div>

    <script>
        const SIZE = 10;
        const SHIPS = [5, 4, 3, 3, 2]; // Carrier, Battleship, Cruiser, Submarine, Destroyer
        
        let playerGrid, aiGrid;
        let isPlayerTurn = true;
        let gameOver = false;
        
        // AI Memory for "smart" guessing
        let aiHuntQueue = [];

        function initGrid() {
            return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            // 0 = water, 1 = ship, 2 = miss, 3 = hit
        }

        function placeShipsRandomly(grid) {
            SHIPS.forEach(shipSize => {
                let placed = false;
                while (!placed) {
                    let isHorizontal = Math.random() > 0.5;
                    let r = Math.floor(Math.random() * SIZE);
                    let c = Math.floor(Math.random() * SIZE);

                    if (canPlaceShip(grid, r, c, shipSize, isHorizontal)) {
                        for (let i = 0; i < shipSize; i++) {
                            if (isHorizontal) grid[r][c + i] = 1;
                            else grid[r + i][c] = 1;
                        }
                        placed = true;
                    }
                }
            });
        }

        function canPlaceShip(grid, r, c, size, isHorizontal) {
            if (isHorizontal && c + size > SIZE) return false;
            if (!isHorizontal && r + size > SIZE) return false;

            for (let i = 0; i < size; i++) {
                if (isHorizontal && grid[r][c + i] !== 0) return false;
                if (!isHorizontal && grid[r + i][c] !== 0) return false;
            }
            return true;
        }

        function renderBoard(elementId, grid, isPlayer) {
            const board = document.getElementById(elementId);
            board.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (grid[r][c] === 1 && isPlayer) cell.classList.add('ship');
                    if (grid[r][c] === 2) cell.classList.add('miss');
                    if (grid[r][c] === 3) { cell.classList.add('hit'); cell.innerText = '💥'; }

                    if (!isPlayer && grid[r][c] < 2) {
                        cell.onclick = () => playerShoot(r, c);
                    }
                    board.appendChild(cell);
                }
            }
        }

        function playerShoot(r, c) {
            if (!isPlayerTurn || gameOver || aiGrid[r][c] >= 2) return;

            if (aiGrid[r][c] === 1) {
                aiGrid[r][c] = 3; // Hit
                updateStatus("Hit!", "var(--hit)");
            } else {
                aiGrid[r][c] = 2; // Miss
                updateStatus("Miss!", "var(--text)");
                isPlayerTurn = false;
                setTimeout(aiShoot, 800);
            }

            renderBoard('ai-board', aiGrid, false);
            checkWin();
        }

        function aiShoot() {
            if (gameOver) return;

            let r, c;
            // Smart AI hunting logic
            if (aiHuntQueue.length > 0) {
                let target = aiHuntQueue.pop();
                r = target.r; c = target.c;
            } else {
                // Random guess
                do {
                    r = Math.floor(Math.random() * SIZE);
                    c = Math.floor(Math.random() * SIZE);
                } while (playerGrid[r][c] >= 2);
            }

            if (playerGrid[r][c] === 1) {
                playerGrid[r][c] = 3; // Hit
                updateStatus("Enemy Hit Your Ship!", "var(--hit)");
                
                // Add adjacent cells to hunt queue
                if (r > 0 && playerGrid[r-1][c] < 2) aiHuntQueue.push({r: r-1, c});
                if (r < SIZE-1 && playerGrid[r+1][c] < 2) aiHuntQueue.push({r: r+1, c});
                if (c > 0 && playerGrid[r][c-1] < 2) aiHuntQueue.push({r, c: c-1});
                if (c < SIZE-1 && playerGrid[r][c+1] < 2) aiHuntQueue.push({r, c: c+1});

                setTimeout(aiShoot, 800); // AI gets to shoot again if it hits
            } else {
                playerGrid[r][c] = 2; // Miss
                updateStatus("Your Turn", "var(--accent)");
                isPlayerTurn = true;
            }

            renderBoard('player-board', playerGrid, true);
            checkWin();
        }

        function checkWin() {
            let aiAlive = aiGrid.flat().includes(1);
            let playerAlive = playerGrid.flat().includes(1);

            if (!aiAlive) {
                updateStatus("YOU WIN THE BATTLE!", "var(--ship)");
                gameOver = true;
            } else if (!playerAlive) {
                updateStatus("ENEMY DESTROYED YOUR FLEET!", "var(--hit)");
                gameOver = true;
            }
        }

        function updateStatus(text, color) {
            const status = document.getElementById('status-msg');
            status.innerText = text;
            status.style.color = color;
        }

        function setupGame() {
            playerGrid = initGrid();
            aiGrid = initGrid();
            placeShipsRandomly(playerGrid);
            placeShipsRandomly(aiGrid);
            
            isPlayerTurn = true;
            gameOver = false;
            aiHuntQueue = [];
            
            updateStatus("Battle Started! Your turn.", "var(--accent)");
            renderBoard('player-board', playerGrid, true);
            renderBoard('ai-board', aiGrid, false);
        }

        // Start game on load
        setupGame();
    </script>
</body>
</html>
